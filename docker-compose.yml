services:
  postgres:
    image: postgres:16-alpine
    container_name: code-to-arch-db
    environment:
      POSTGRES_USER: abdu1lah
      POSTGRES_PASSWORD: abdu1lah@2006
      POSTGRES_DB: code_to_arch_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U abdu1lah -d code_to_arch_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: