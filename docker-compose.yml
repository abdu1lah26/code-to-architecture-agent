version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: code-to-arch-db
    environment:
      POSTGRES_USER: abdu1lah
      POSTGRES_PASSWORD: abdu1lah@2006
      POSTGRES_DB: code_to_arch_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U abdu1lah -d code_to_arch_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - code-to-arch-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: code-to-arch-backend
    environment:
      DATABASE_URL: postgresql://abdu1lah:abdu1lah%402006@postgres:5432/code_to_arch_db
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-mistral}
      PYTHONUNBUFFERED: 1
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend/chroma_data:/app/chroma_data
    networks:
      - code-to-arch-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: code-to-arch-frontend
    environment:
      VITE_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - code-to-arch-network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  code-to-arch-network:
    driver: bridge